name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: git diff --name-only --diff-filter=ACMR -z "$BASE_SHA" "$GITHUB_SHA" | xargs -0 -r vp check
