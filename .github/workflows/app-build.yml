name: App build

on:
  push:
    branches: [main]
    paths-ignore:
      - .github/ISSUE_TEMPLATE/**
      - .github/dependabot.yml
      - docs/**
      - "**/*.md"
  pull_request:
    paths-ignore:
      - .github/ISSUE_TEMPLATE/**
      - .github/dependabot.yml
      - docs/**
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: app-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-latest
          - name: macOS
            runner: macos-latest
          - name: Linux
            runner: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Linux build dependencies
        if: matrix.platform.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libmpv-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            xz-utils

      - name: Install macOS build dependencies
        if: matrix.platform.name == 'macOS'
        run: brew install mpv pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: |
            harbor-core
            src-tauri

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@8a7496fd44e8a1b0a88a7459e36213b2fefc1d15 # v1
        with:
          node-version-file: .nvmrc
          cache: true
          run-install: |
            args:
              - --frozen-lockfile

      - name: Prepare build assets
        run: vp run setup

      - name: Build app without installers
        run: vp exec tauri build --no-bundle
