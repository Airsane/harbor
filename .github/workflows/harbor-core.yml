name: Harbor Core

on:
  push:
    paths:
      - "harbor-core/**"
      - ".github/workflows/harbor-core.yml"
  pull_request:
    paths:
      - "harbor-core/**"
      - ".github/workflows/harbor-core.yml"

permissions:
  contents: read

concurrency:
  group: harbor-core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    defaults:
      run:
        working-directory: harbor-core
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust build
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: harbor-core
      - run: cargo check --all-targets
      - run: cargo test --all-targets
      - run: cargo clippy --all-targets -- -D warnings

  wasm:
    name: cargo check (wasm32)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: harbor-core
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Rust build
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: harbor-core
      - run: cargo check --target wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl --fail --location --retry 3 --retry-all-errors https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - run: wasm-pack build --target bundler --out-dir pkg
